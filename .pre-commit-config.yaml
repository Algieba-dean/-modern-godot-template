exclude: '^(\.git|\.godot|\.venv|reference|addons/gdUnit4|addons/godot_mcp|builds|reports|.*\.import)'

default_stages: [pre-commit]
fail_fast: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ["--branch", "main", "--branch", "master"]

  - repo: local
    hooks:
      - id: gdformat
        name: gdformat
        entry: uv run gdformat --check
        language: system
        types_or: [gdscript]
        exclude: '^(addons/gdUnit4|addons/godot_mcp)/'

      - id: gdlint
        name: gdlint
        entry: uv run gdlint
        language: system
        types_or: [gdscript]
        exclude: '^(addons/gdUnit4|addons/godot_mcp)/'
