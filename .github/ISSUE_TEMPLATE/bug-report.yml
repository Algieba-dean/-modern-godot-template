name: Bug report
description: Report a reproducible gameplay, editor, or tooling issue.
title: "fix: "
labels: ["kind/bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: List exact steps from a clean project checkout when possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - Godot:
        - OS:
        - Branch/commit:
