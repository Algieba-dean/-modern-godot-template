name: Feature request
description: Propose a gameplay, tooling, or content feature.
title: "feat: "
labels: ["kind/feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What player, designer, or developer need does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and non-goals
