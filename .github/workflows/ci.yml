name: CI

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev tools
        run: uv sync --dev

      - name: Run pre-commit
        run: SKIP=no-commit-to-branch uv run pre-commit run --all-files --show-diff-on-failure

      - name: Check GDScript formatting
        run: uv run gdformat --check scripts/main.gd tests/test_smoke.gd

      - name: Run GDScript linter
        run: uv run gdlint scripts/main.gd tests/test_smoke.gd

  validate:
    name: Validate Godot Project
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run GdUnit4 tests
        uses: MikeSchulze/gdUnit4-action@v1.0.2
        with:
          godot-version: "4.7"
          paths: |
            res://tests/
          timeout: 5
          report-name: test_report.xml
